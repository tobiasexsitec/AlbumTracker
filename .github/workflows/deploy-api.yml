name: Deploy Function App

on:
  push:
    branches: [main]
    paths:
      - 'AlbumTracker.Api/**'
      - 'AlbumTracker.Api.Core/**'
      - 'AlbumTracker.MusicBrainz/**'
      - 'AlbumTracker.Spotify/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  API_PROJECT: AlbumTracker.Api/AlbumTracker.Api.csproj

jobs:
  deploy:
    name: Deploy Function App Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Function App
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --output ./publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Function App name
        id: getapp
        run: |
          APP_NAME=$(az functionapp list --resource-group rg-albumtracker --query "[0].name" --output tsv)
          echo "functionAppName=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v2
        with:
          app-name: ${{ steps.getapp.outputs.functionAppName }}
          package: ./publish
