name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pages: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy Function App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Function App
        run: dotnet publish AlbumTracker.Api/AlbumTracker.Api.csproj --configuration Release --output ./publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Function App name
        id: getapp
        run: |
          APP_NAME=$(az functionapp list --resource-group rg-albumtracker --query "[0].name" --output tsv)
          echo "functionAppName=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.getapp.outputs.functionAppName }}
          package: ./publish

  deploy-app:
    name: Deploy to GitHub Pages
    needs: deploy-api
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish AlbumTracker.csproj -c Release -o output

      - name: Rewrite base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/AlbumTracker/" />|g' output/wwwroot/index.html

      - name: Fix service worker integrity after base href rewrite
        run: |
          INDEX_FILE=output/wwwroot/index.html
          SW_ASSETS=output/wwwroot/service-worker-assets.js
          NEW_HASH=$(openssl dgst -sha256 -binary "$INDEX_FILE" | openssl base64 -A)
          OLD_HASH=$(grep -B1 '"url": "index.html"' "$SW_ASSETS" | grep -oP 'sha256-\K[A-Za-z0-9+/=]+')
          sed -i "s|sha256-${OLD_HASH}|sha256-${NEW_HASH}|" "$SW_ASSETS"
          rm -f output/wwwroot/index.html.br output/wwwroot/index.html.gz
          rm -f output/wwwroot/service-worker-assets.js.br output/wwwroot/service-worker-assets.js.gz

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Copy index.html to 404.html
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
